services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: orcamento-execucao_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db

  frontend:
    build: ./frontend
    depends_on:
      - backend

volumes:
  pgdata:
